# AI Dev Flow v3.2 — 6 阶段状态追踪
# stage-tracker hook 自动更新；人手动设定 blocked 触发回退
# 阶段: explore → spec → tickets → tdd → implement → done

project: ""
version: "3.0"
mode: "server"
stages:
  explore: { status: pending, desc: "Plan Mode 初稿 / /grill-with-docs 需求澄清" }
  spec:    { status: pending, desc: "/to-spec 产出规格（Ponytail + 三假设 + 验证层级）" }
  tickets: { status: pending, desc: "/to-tickets 拆工单（每 ticket ≤ 上下文 40%）" }
  implement: { status: pending, desc: "/implement 实现 + /code-review 审查" }
  done:    { status: pending, desc: "PR 合入 + 复盘 → CLAUDE.md # Lessons" }
